<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }

    h1 {
      color: #e94560;
      font-size: 32px;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* Difficulty pills */
    #difficulty {
      display: flex;
      gap: 10px;
    }

    #difficulty button {
      background: #0f3460;
      color: #a0aec0;
      border: 1px solid #0f3460;
      padding: 6px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }

    #difficulty button.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    /* Status */
    #status {
      color: #4fc3f7;
      font-size: 16px;
      letter-spacing: 1px;
      height: 24px;
    }

    /* Board */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.locked) {
      border-color: #4fc3f7;
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
    }

    .cell.x { color: #e94560; cursor: default; }
    .cell.o { color: #4fc3f7; cursor: default; }
    .cell.taken { cursor: default; }
    .cell.locked { cursor: default; }

    .cell.winner {
      border-color: #f6e05e;
      box-shadow: 0 0 16px rgba(246, 224, 94, 0.5);
    }

    /* Score */
    #score {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .score-item {
      text-align: center;
    }

    .score-value {
      font-size: 28px;
      font-weight: bold;
    }

    .score-value.x { color: #e94560; }
    .score-value.draw { color: #a0aec0; }
    .score-value.o { color: #4fc3f7; }

    .score-label {
      color: #a0aec0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* New game button */
    #new-game {
      background: transparent;
      color: #a0aec0;
      border: 1px solid #0f3460;
      padding: 8px 28px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      letter-spacing: 1px;
      transition: border-color 0.15s, color 0.15s;
    }

    #new-game:hover {
      border-color: #4fc3f7;
      color: #4fc3f7;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="difficulty">
    <button class="active" data-level="easy">Easy</button>
    <button data-level="medium">Medium</button>
    <button data-level="hard">Hard</button>
  </div>

  <div id="status">Your turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div id="score">
    <div class="score-item">
      <div class="score-value x" id="score-x">0</div>
      <div class="score-label">You (X)</div>
    </div>
    <div class="score-item">
      <div class="score-value draw" id="score-draw">0</div>
      <div class="score-label">Draws</div>
    </div>
    <div class="score-item">
      <div class="score-value o" id="score-o">0</div>
      <div class="score-label">AI (O)</div>
    </div>
  </div>

  <button id="new-game">New Game</button>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────────
    let board = Array(9).fill(null);   // null | 'X' | 'O'
    let difficulty = 'easy';
    let gameOver = false;
    const score = { X: 0, draw: 0, O: 0 };

    // ─── DOM refs ────────────────────────────────────────────────────────────────
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const scoreXEl = document.getElementById('score-x');
    const scoreDrawEl = document.getElementById('score-draw');
    const scoreOEl = document.getElementById('score-o');

    // ─── Render ──────────────────────────────────────────────────────────────────
    function renderBoard(winLine = []) {
      cells.forEach((cell, i) => {
        const val = board[i];
        cell.textContent = val ?? '';
        cell.className = 'cell';
        if (val === 'X') cell.classList.add('x', 'taken');
        if (val === 'O') cell.classList.add('o', 'taken');
        if (gameOver) cell.classList.add('locked');
        if (winLine.includes(i)) cell.classList.add('winner');
      });
    }

    function renderScore() {
      scoreXEl.textContent = score.X;
      scoreDrawEl.textContent = score.draw;
      scoreOEl.textContent = score.O;
    }

    // ─── Game logic (pure functions) ─────────────────────────────────────────────
    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],   // rows
      [0,3,6],[1,4,7],[2,5,8],   // columns
      [0,4,8],[2,4,6]            // diagonals
    ];

    // Returns { winner: 'X'|'O', line: [i,j,k] } or null
    function checkWinner(b) {
      for (const line of WIN_LINES) {
        const [a, bb, c] = line;
        if (b[a] && b[a] === b[bb] && b[a] === b[c]) {
          return { winner: b[a], line };
        }
      }
      return null;
    }

    // Returns true if board is full with no winner
    function isDraw(b) {
      return b.every(cell => cell !== null) && !checkWinner(b);
    }

    // ─── Game flow ────────────────────────────────────────────────────────────────
    function endGame(result) {
      // result: 'X' | 'O' | 'draw'
      gameOver = true;
      const winResult = checkWinner(board);
      renderBoard(winResult ? winResult.line : []);
      if (result === 'X') {
        score.X++;
        statusEl.textContent = 'You win!';
      } else if (result === 'O') {
        score.O++;
        statusEl.textContent = 'AI wins!';
      } else {
        score.draw++;
        statusEl.textContent = "It's a draw!";
      }
      renderScore();
    }

    function playerMove(index) {
      if (gameOver || board[index]) return;
      board[index] = 'X';
      renderBoard();
      const win = checkWinner(board);
      if (win) { endGame('X'); return; }
      if (isDraw(board)) { endGame('draw'); return; }
      statusEl.textContent = 'AI thinking...';
      setTimeout(aiMove, 300);
    }

    // Wire up cell clicks
    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        playerMove(Number(cell.dataset.index));
      });
    });

    // ─── AI ──────────────────────────────────────────────────────────────────────
    function getEmptyCells(b) {
      return b.reduce((acc, val, i) => (val === null ? [...acc, i] : acc), []);
    }

    function aiEasy(b) {
      const empty = getEmptyCells(b);
      return empty[Math.floor(Math.random() * empty.length)];
    }

    // Returns the index of a winning move for `player`, or null
    function findWinningMove(b, player) {
      for (const line of WIN_LINES) {
        const [a, bb, c] = line;
        const vals = [b[a], b[bb], b[c]];
        const playerCount = vals.filter(v => v === player).length;
        const emptyCount = vals.filter(v => v === null).length;
        if (playerCount === 2 && emptyCount === 1) {
          return line[vals.indexOf(null)];
        }
      }
      return null;
    }

    function aiMedium(b) {
      // Win if possible
      const win = findWinningMove(b, 'O');
      if (win !== null) return win;
      // Block player win
      const block = findWinningMove(b, 'X');
      if (block !== null) return block;
      // Otherwise random
      return aiEasy(b);
    }

    function minimax(b, isMaximizing) {
      const result = checkWinner(b);
      if (result) return result.winner === 'O' ? 10 : -10;
      if (isDraw(b)) return 0;

      const empty = getEmptyCells(b);
      if (isMaximizing) {
        let best = -Infinity;
        for (const i of empty) {
          b[i] = 'O';
          best = Math.max(best, minimax(b, false));
          b[i] = null;
        }
        return best;
      } else {
        let best = Infinity;
        for (const i of empty) {
          b[i] = 'X';
          best = Math.min(best, minimax(b, true));
          b[i] = null;
        }
        return best;
      }
    }

    function aiHard(b) {
      let bestScore = -Infinity;
      let bestIndex = null;
      for (const i of getEmptyCells(b)) {
        b[i] = 'O';
        const score = minimax(b, false);
        b[i] = null;
        if (score > bestScore) {
          bestScore = score;
          bestIndex = i;
        }
      }
      return bestIndex;
    }

    function aiMove() {
      let index;
      if (difficulty === 'easy') index = aiEasy(board);
      else if (difficulty === 'medium') index = aiMedium(board);
      else index = aiHard(board);
      board[index] = 'O';
      renderBoard();
      const win = checkWinner(board);
      if (win) { endGame('O'); return; }
      if (isDraw(board)) { endGame('draw'); return; }
      statusEl.textContent = 'Your turn';
    }

    // ─── Controls ─────────────────────────────────────────────────────────────────
    function resetBoard() {
      board = Array(9).fill(null);
      gameOver = false;
      statusEl.textContent = 'Your turn';
      renderBoard();
    }

    document.querySelectorAll('#difficulty button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#difficulty button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        difficulty = btn.dataset.level;
        resetBoard();
      });
    });

    document.getElementById('new-game').addEventListener('click', resetBoard);

    // ─── Init ─────────────────────────────────────────────────────────────────────
    renderBoard();
    renderScore();
    statusEl.textContent = 'Your turn';
  </script>
</body>
</html>
